<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" fill="none" width="500" height="700">

  <!-- === BACKGROUND DECORATIVE ELEMENTS === -->

  <!-- Outer large circle / halo -->
  <circle cx="250" cy="310" r="195" stroke="currentColor" stroke-width="1.2" stroke-dasharray="6 5" fill="none" opacity="0.35"/>

  <!-- Middle circle -->
  <circle cx="250" cy="310" r="155" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Inner circle tight around crossguard -->
  <circle cx="250" cy="310" r="80" stroke="currentColor" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Radial tick marks (like a clock/compass) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.25">
    <line x1="250" y1="115" x2="250" y2="128"/>
    <line x1="347.5" y1="164" x2="341" y2="175.4"/>
    <line x1="396" y1="261.5" x2="383" y2="261.5"/>
    <line x1="347.5" y1="359" x2="341" y2="347.6"/>
    <line x1="250" y1="505" x2="250" y2="492"/>
    <line x1="152.5" y1="359" x2="159" y2="347.6"/>
    <line x1="104" y1="261.5" x2="117" y2="261.5"/>
    <line x1="152.5" y1="164" x2="159" y2="175.4"/>
    <!-- Diagonal marks -->
    <line x1="318" y1="131" x2="312" y2="143"/>
    <line x1="182" y1="131" x2="188" y2="143"/>
    <line x1="380" y1="207" x2="368.5" y2="213"/>
    <line x1="380" y1="315" x2="368.5" y2="315"/>
  </g>

  <!-- Cross/Compass lines behind sword -->
  <line x1="250" y1="100" x2="250" y2="115" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="505" x2="250" y2="520" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <line x1="55" y1="310" x2="95" y2="310" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <line x1="405" y1="310" x2="445" y2="310" stroke="currentColor" stroke-width="1" opacity="0.2"/>

  <!-- Small corner rune-like symbols (top-left area) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <line x1="72" y1="148" x2="82" y2="148"/>
    <line x1="77" y1="143" x2="77" y2="153"/>
    <line x1="66" y1="160" x2="88" y2="160"/>
  </g>

  <!-- Small corner rune-like symbols (top-right area) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <line x1="418" y1="148" x2="428" y2="148"/>
    <line x1="423" y1="143" x2="423" y2="153"/>
    <line x1="412" y1="160" x2="434" y2="160"/>
  </g>

  <!-- Tiny diamond ornaments at cardinal points (on outer dashed circle) -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
    <polygon points="250,108 255,114 250,120 245,114"/> <!-- top -->
    <polygon points="250,500 255,506 250,512 245,506"/> <!-- bottom -->
    <polygon points="54,305 60,310 54,315 48,310"/>     <!-- left -->
    <polygon points="446,305 452,310 446,315 440,310"/> <!-- right -->
  </g>

  <!-- === THE SWORD === -->

  <!-- BLADE — tapered, planted pointing DOWN (tip at bottom) -->
  <path d="
    M 238 315
    L 232 380
    L 228 440
    L 226 490
    L 250 590
    L 274 490
    L 272 440
    L 268 380
    L 262 315
    Z"
    stroke="currentColor" stroke-width="1.8" fill="white" stroke-linejoin="round"/>

  <!-- Fuller / center ridge line on blade -->
  <line x1="250" y1="322" x2="250" y2="545" stroke="currentColor" stroke-width="1" opacity="0.5"/>

  <!-- Blade edge detail lines (subtle bevel marks) -->
  <line x1="237" y1="340" x2="240" y2="470" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>
  <line x1="263" y1="340" x2="260" y2="470" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>

  <!-- Blade etching: small cross near ricasso -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.5">
    <line x1="250" y1="335" x2="250" y2="350"/>
    <line x1="244" y1="342" x2="256" y2="342"/>
  </g>

  <!-- CROSSGUARD — wide horizontal bar with slight curve up at ends -->
  <path d="
    M 140 315
    C 155 308, 185 310, 238 315
    L 262 315
    C 315 310, 345 308, 360 315
    C 345 323, 315 320, 262 317
    L 238 317
    C 185 320, 155 323, 140 315
    Z"
    stroke="currentColor" stroke-width="1.8" fill="white" stroke-linejoin="round"/>

  <!-- Crossguard decorative detail — center notch -->
  <path d="M 244 315 L 250 308 L 256 315 L 250 319 Z"
    stroke="currentColor" stroke-width="1" fill="white"/>

  <!-- Crossguard end ornament LEFT -->
  <ellipse cx="140" cy="315" rx="8" ry="6" stroke="currentColor" stroke-width="1.5" fill="white"/>
  <ellipse cx="140" cy="315" rx="3" ry="2.5" stroke="currentColor" stroke-width="1" fill="white"/>

  <!-- Crossguard end ornament RIGHT -->
  <ellipse cx="360" cy="315" rx="8" ry="6" stroke="currentColor" stroke-width="1.5" fill="white"/>
  <ellipse cx="360" cy="315" rx="3" ry="2.5" stroke="currentColor" stroke-width="1" fill="white"/>

  <!-- GRIP — slightly tapered rectangular handle going UP -->
  <path d="
    M 242 315
    L 240 255
    C 240 252, 243 250, 250 250
    C 257 250, 260 252, 260 255
    L 258 315
    Z"
    stroke="currentColor" stroke-width="1.8" fill="white"/>

  <!-- Grip wrapping detail lines -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.55">
    <line x1="240.5" y1="305" x2="259.5" y2="305"/>
    <line x1="240.5" y1="296" x2="259.5" y2="296"/>
    <line x1="240.5" y1="287" x2="259.5" y2="287"/>
    <line x1="240.5" y1="278" x2="259.5" y2="278"/>
    <line x1="240.5" y1="269" x2="259.5" y2="269"/>
    <line x1="240.5" y1="260" x2="259.5" y2="260"/>
  </g>

  <!-- POMMEL — large ornate disk/cross shape at top -->
  <circle cx="250" cy="235" r="28" stroke="currentColor" stroke-width="1.8" fill="white"/>
  <circle cx="250" cy="235" r="19" stroke="currentColor" stroke-width="1" fill="white" opacity="1"/>

  <!-- Pommel cross/rose window detail -->
  <g stroke="currentColor" stroke-width="0.9" fill="none">
    <line x1="250" y1="218" x2="250" y2="252"/>
    <line x1="233" y1="235" x2="267" y2="235"/>
    <line x1="238" y1="223" x2="262" y2="247"/>
    <line x1="262" y1="223" x2="238" y2="247"/>
  </g>

  <!-- Center gem of pommel -->
  <circle cx="250" cy="235" r="5" stroke="currentColor" stroke-width="1.2" fill="white"/>

  <!-- === FLOATING DECORATIVE ELEMENTS AROUND SWORD === -->

  <!-- Small scales of justice icon — top left -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.5" transform="translate(90, 200)">
    <line x1="20" y1="0" x2="20" y2="28"/>
    <line x1="8" y1="6" x2="32" y2="6"/>
    <line x1="8" y1="6" x2="2" y2="18"/>
    <line x1="2" y1="18" x2="14" y2="18"/>
    <line x1="14" y1="18" x2="8" y2="6"/>
    <line x1="32" y1="6" x2="26" y2="18"/>
    <line x1="26" y1="18" x2="38" y2="18"/>
    <line x1="38" y1="18" x2="32" y2="6"/>
    <line x1="14" y1="28" x2="26" y2="28"/>
  </g>

  <!-- Flame-like spike elements — upper left -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M 148 190 C 145 180, 152 175, 150 165 C 155 173, 152 182, 155 190"/>
    <path d="M 138 190 C 134 178, 142 172, 139 160 C 145 170, 141 180, 145 190"/>
  </g>

  <!-- Flame-like spike elements — upper right -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M 352 190 C 349 180, 356 175, 354 165 C 359 173, 356 182, 359 190"/>
    <path d="M 362 190 C 358 178, 366 172, 363 160 C 369 170, 365 180, 369 190"/>
  </g>

  <!-- Star/asterisk ornaments -->
  <g stroke="currentColor" stroke-width="1" opacity="0.4">
    <line x1="115" y1="385" x2="115" y2="375"/>
    <line x1="110" y1="382" x2="120" y2="378"/>
    <line x1="110" y1="378" x2="120" y2="382"/>
    <line x1="385" y1="385" x2="385" y2="375"/>
    <line x1="380" y1="382" x2="390" y2="378"/>
    <line x1="380" y1="378" x2="390" y2="382"/>
  </g>

  <!-- Laurel-like bracket ornament — bottom left of blade -->
  <path d="M 210 460 C 198 465, 195 478, 205 484"
    stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 210 475 C 200 478, 198 488, 207 492"
    stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Laurel-like bracket ornament — bottom right of blade -->
  <path d="M 290 460 C 302 465, 305 478, 295 484"
    stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 290 475 C 300 478, 302 488, 293 492"
    stroke="currentColor" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Ground impact / crack lines at tip -->
  <g stroke="currentColor" stroke-width="0.9" opacity="0.45" stroke-linecap="round">
    <line x1="250" y1="590" x2="222" y2="610"/>
    <line x1="250" y1="590" x2="278" y2="610"/>
    <line x1="250" y1="590" x2="210" y2="625"/>
    <line x1="250" y1="590" x2="290" y2="625"/>
    <line x1="250" y1="590" x2="200" y2="638"/>
    <line x1="250" y1="590" x2="300" y2="638"/>
  </g>

  <!-- Shadow ellipse at base -->
  <ellipse cx="250" cy="628" rx="52" ry="8" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.2"/>
  <ellipse cx="250" cy="628" rx="30" ry="4" stroke="currentColor" stroke-width="0.6" fill="none" opacity="0.15"/>

  <!-- === LATIN TEXT LABEL === -->
  <text x="250" y="90" text-anchor="middle"
    font-family="Georgia, serif" font-size="9" letter-spacing="4"
    fill="currentColor" opacity="0.35">IUSTITIA · VERITAS · LEX</text>

</svg>
